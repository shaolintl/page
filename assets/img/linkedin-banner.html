<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Raleway';
    src: local('Raleway');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; overflow: hidden; }
  body {
    font-family: 'Raleway', 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(115deg, #0f172a 0%, #0f2c40 45%, #123b55 100%);
    position: relative;
    width: 1584px;
    height: 396px;
  }
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: #149ddd;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .glow {
    position: absolute;
    right: -120px; top: -160px;
    width: 620px; height: 620px;
    background: radial-gradient(circle, rgba(20,157,221,0.35) 0%, rgba(20,157,221,0) 70%);
  }
  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 90px;
    width: 100%;
  }
  .eyebrow {
    color: #5ec3ee;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .eyebrow .sep { color: #2c6f93; margin: 0 10px; }
  h1 {
    color: #ffffff;
    font-size: 41px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.3px;
    margin-bottom: 16px;
    white-space: nowrap;
  }
  .tagline {
    color: #c4d6e3;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.5;
    width: 100%;
    text-align: right;
    white-space: nowrap;
  }
  .badges {
    position: absolute;
    right: 90px;
    bottom: 56px;
    display: flex;
    gap: 12px;
  }
  .badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(94,195,238,0.45);
    color: #aee0f7;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="eyebrow">AI Transition Manager<span class="sep">&middot;</span>Trainer<span class="sep">&middot;</span>Fractional AI Officer</div>
    <h1>Trustworthy, human-supervised AI for any organisation</h1>
    <p class="tagline">I build it with your team, train them as we go, and leave them able to run it. Deep depth in regulated industries.</p>
  </div>
  <div class="badges">
    <span class="badge">On-premise &amp; GDPR</span>
    <span class="badge">EU AI Act ready</span>
    <span class="badge">Verification-first</span>
  </div>
</body>
</html>
